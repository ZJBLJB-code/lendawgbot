name: GitHub Pages

# Primary publish path. Uses GitHub's built-in GITHUB_TOKEN — no user secrets,
# no Cloudflare account needed. Site goes live at
#   https://<owner>.github.io/<repo>/
# the moment Pages is enabled in repo Settings (Source: "GitHub Actions").
#
# Cron note: schedules are UTC. Times below assume Pacific Daylight Time (PDT,
# UTC-7). When PT flips to PST in November, bump each cron by one hour.

on:
  push:
    branches: [main]
  schedule:
    # Daily at 1:30pm ET — the post-bot-EOD refresh.
    # GitHub Actions cron is UTC-only, so we schedule both 17:30 and 18:30 UTC
    # to cover the 1:30pm ET window year-round regardless of DST:
    #   • EDT (Mar–Nov, UTC-4): 17:30 UTC = 1:30pm ET ✓ ; 18:30 UTC = 2:30pm ET (harmless extra)
    #   • EST (Nov–Mar, UTC-5): 17:30 UTC = 12:30pm ET (harmless early); 18:30 UTC = 1:30pm ET ✓
    # Net: at least one fire happens at 1:30pm ET every day, no DST babysitting.
    - cron: "30 17,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages only allows one in-flight deployment at a time. Newer run wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python3 scripts/generate_sample_data.py

      - name: PII red-team grep on canonical dashboard
        # Last line of defense: even though the allow-list schema in
        # tools/publisher_schema.py drops unknown keys, this grep catches
        # any future regression in the schema layer or a manually-edited
        # data/dashboard.json. Fail the build red on any hit — better a
        # broken pipeline than a leaked account number on a public URL.
        # Only runs when canonical is committed; sample-fallback path is
        # exempt (sample.json is by definition synthetic).
        if: hashFiles('data/dashboard.json') != ''
        run: |
          set -e
          # Real account ID + paper account ID + raw-event PII field names.
          # Whitespace-tolerant fixed-string grep (-F) for the literals,
          # plus extended regex for the field-name patterns.
          PATTERNS='U25438416|DUP187165|"equity_usd"|"account_id"|"current_equity_usd"|"net_pnl_usd"|"equity_after_usd"|"gross_pnl_usd"|"drawdown_pct"|"host"\s*:|"client_id"\s*:|"bot_pid"'
          if grep -E "$PATTERNS" data/dashboard.json; then
            echo "::error::PII leak detected in data/dashboard.json — see matches above."
            exit 1
          fi
          echo "PII grep clean."

      - name: Staleness assertion (warn-only)
        # If the canonical JSON is more than 30h old, log a warning. We
        # don't fail the build because the dashboard MUST still render
        # honestly (the stale state shows yellow in the provenance bar),
        # but the warning surfaces in the Actions UI for triage.
        if: hashFiles('data/dashboard.json') != ''
        run: |
          python3 - <<'PY'
          import json, sys
          from datetime import datetime, timezone
          d = json.load(open("data/dashboard.json"))
          ts = (d.get("_provenance") or {}).get("data_as_of")
          if not ts:
              print("::warning::no _provenance.data_as_of — cannot assess staleness")
              sys.exit(0)
          dt = datetime.fromisoformat(ts.replace("Z", "+00:00"))
          age_h = (datetime.now(timezone.utc) - dt).total_seconds() / 3600
          print(f"data_age_hours = {age_h:.2f}")
          if age_h > 30:
              print(f"::warning::canonical dashboard.json is {age_h:.1f}h stale — bot publisher may have stalled")
          PY

      - name: Build
        # v2 architecture: prefer the committed canonical dashboard JSON
        # (data/dashboard.json), produced offline by tools/publisher.py from
        # quant-bot's raw artifacts. CI runners don't have the bot's full
        # state, so the canonical JSON is the contract between the local
        # operator (refresh.sh) and CI.
        #
        # If data/dashboard.json is present → --from canonical (the canonical
        # path).  If it's missing → --from sample (cron stays green; the
        # provenance bar will show "sample-fallback").
        run: |
          if [ -f data/dashboard.json ]; then
            echo "Using committed canonical dashboard.json"
            python3 scripts/build.py --from canonical --root data/dashboard.json --also-demo --publisher github-pages
          else
            echo "No canonical dashboard.json — falling back to sample"
            python3 scripts/build.py --from sample --also-demo --publisher github-pages
          fi

      - name: Verify status
        run: |
          set -e
          test -f dist/index.html
          test -f dist/demo.html
          test -f dist/_status.json
          python3 - <<'PY'
          import json, sys
          s = json.load(open("dist/_status.json"))
          assert s["ok"] is True, s
          assert s["schema_version"] == 1, s
          assert s["publisher"] == "github-pages", s
          # canonical is the preferred source; sample is the green-fallback.
          assert s["last_build_source"] in ("canonical", "sample"), s
          print("status ok:", s["mode"], s["last_build_source"], s["publisher"])
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
