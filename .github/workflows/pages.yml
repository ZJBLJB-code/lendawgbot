name: GitHub Pages

# Primary publish path. Uses GitHub's built-in GITHUB_TOKEN — no user secrets,
# no Cloudflare account needed. Site goes live at
#   https://<owner>.github.io/<repo>/
# the moment Pages is enabled in repo Settings (Source: "GitHub Actions").
#
# Cron note: schedules are UTC. Times below assume Pacific Daylight Time (PDT,
# UTC-7). When PT flips to PST in November, bump each cron by one hour.

on:
  push:
    branches: [main]
  schedule:
    # Daily at 1:30pm ET — the post-bot-EOD refresh.
    # GitHub Actions cron is UTC-only, so we schedule both 17:30 and 18:30 UTC
    # to cover the 1:30pm ET window year-round regardless of DST:
    #   • EDT (Mar–Nov, UTC-4): 17:30 UTC = 1:30pm ET ✓ ; 18:30 UTC = 2:30pm ET (harmless extra)
    #   • EST (Nov–Mar, UTC-5): 17:30 UTC = 12:30pm ET (harmless early); 18:30 UTC = 1:30pm ET ✓
    # Net: at least one fire happens at 1:30pm ET every day, no DST babysitting.
    - cron: "30 17,18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages only allows one in-flight deployment at a time. Newer run wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Generate sample data
        run: python3 scripts/generate_sample_data.py

      - name: Build
        # Reads the checked-in quant-bot snapshot under data/quant_bot_journal/.
        # --also-demo emits the fabricated showcase as demo.html.
        # Adapter never raises: missing snapshot falls back to sample.json so
        # cron stays green. --publisher tags the heartbeat for monitors.
        run: python3 scripts/build.py --from quant-bot --root data/quant_bot_journal --mode AUTO --also-demo --publisher github-pages

      - name: Verify status
        run: |
          set -e
          test -f dist/index.html
          test -f dist/demo.html
          test -f dist/_status.json
          python3 -c "import json; s=json.load(open('dist/_status.json')); assert s['ok'] is True, s; assert s['schema_version']==1, s; assert s['publisher']=='github-pages', s; print('status ok:', s['mode'], s['last_build_source'], s['publisher'])"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
